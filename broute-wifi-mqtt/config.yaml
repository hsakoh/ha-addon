name: "BRoute-WiFi-Mqtt"
description: "[For Japan] Integrate generation 2 low-voltage smart energy meters into Home Assistant's MQTT as devices/sensors via Wi-Fi and ECHONET Lite protocol."
version: "0.0.4"
slug: "broute_wifi_mqtt"
url: "https://github.com/hsakoh/broute-wifi-mqtt"
startup: application
boot: manual
init: false
image: ghcr.io/hsakoh/broute-wifi-mqtt-{arch}
arch:
  - aarch64
  - amd64
host_network: true
services:
  - 'mqtt:need'
options:
  BRoute:
    NetworkInterfaceName: 'auto'
    InstantaneousValueInterval: '00:01:10'
    PropertyReadTimeout: '00:00:05'
    PropertyReadMaxRetryAttempts: 3
    PropertyReadRetryDelay: '00:00:05'
    PropertyReadIntervalDelay: '00:00:02'
    ContinuePollingOnError: true
    DiscoveryTimeout: '00:00:30'
  Mqtt:
    AutoConfig: true
    Host: ''
    Port: 1883
    Id: ''
    Pw: ''
    Tls: false
  LogLevel: 'Information'
schema:
  BRoute:
    NetworkInterfaceName: str
    InstantaneousValueInterval: str
    PropertyReadTimeout: str
    PropertyReadMaxRetryAttempts: int
    PropertyReadRetryDelay: str
    PropertyReadIntervalDelay: str
    ContinuePollingOnError: bool
    DiscoveryTimeout: str
  Mqtt:
    AutoConfig: bool
    Host: str?
    Port: "int(0,65535)?"
    Id: str?
    Pw: password?
    Tls: bool?
  LogLevel: list(Trace|Debug|Information|Warning|Error|Critical|None)
